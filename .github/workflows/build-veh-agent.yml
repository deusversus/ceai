name: Build VEH Agent

on:
  push:
    paths:
      - 'native/veh_agent/**'
  workflow_dispatch:

jobs:
  build-agent-x64:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Compile veh_agent.dll (x64)
        working-directory: native/veh_agent
        run: |
          cl.exe /LD /O2 /W4 /WX veh_agent.c /link /DLL /OUT:veh_agent.dll kernel32.lib
          if ($LASTEXITCODE -ne 0) { exit 1 }
          dir veh_agent.dll

      - name: Upload artifact (x64)
        uses: actions/upload-artifact@v5
        with:
          name: veh-agent-dll-x64
          path: native/veh_agent/veh_agent.dll

  build-agent-x86:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup MSVC (x86)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Compile veh_agent_x86.dll (x86)
        working-directory: native/veh_agent
        run: |
          cl.exe /LD /O2 /W4 /WX veh_agent.c /link /DLL /OUT:veh_agent_x86.dll kernel32.lib
          if ($LASTEXITCODE -ne 0) { exit 1 }
          dir veh_agent_x86.dll

      - name: Upload artifact (x86)
        uses: actions/upload-artifact@v5
        with:
          name: veh-agent-dll-x86
          path: native/veh_agent/veh_agent_x86.dll
