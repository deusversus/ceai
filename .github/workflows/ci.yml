name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        run: dotnet restore CEAISuite.slnx

      - name: Build (Debug)
        run: dotnet build CEAISuite.slnx -c Debug --no-restore

      - name: Build (Release)
        run: dotnet build CEAISuite.slnx -c Release --no-restore

      - name: Test
        run: dotnet test src/CEAISuite.Tests/CEAISuite.Tests.csproj -c Debug --no-build --verbosity normal
