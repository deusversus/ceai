name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        run: dotnet restore CEAISuite.slnx

      - name: Build (Debug)
        run: dotnet build CEAISuite.slnx -c Debug --no-restore

      - name: Build (Release)
        run: dotnet build CEAISuite.slnx -c Release --no-restore

      - name: Test (Debug)
        run: dotnet test src/CEAISuite.Tests/CEAISuite.Tests.csproj -c Debug --no-build --verbosity normal --settings src/CEAISuite.Tests/coverage.runsettings --results-directory ./coverage

      - name: Test (Release)
        if: always()
        run: dotnet test src/CEAISuite.Tests/CEAISuite.Tests.csproj -c Release --no-build --verbosity normal

      - name: Install ReportGenerator
        if: always()
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate Coverage Report
        if: always()
        run: reportgenerator -reports:coverage/**/coverage.cobertura.xml -targetdir:coverage/report -reporttypes:TextSummary

      - name: Coverage Summary
        if: always()
        run: cat coverage/report/Summary.txt
        shell: bash

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage/report/

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/**/coverage.cobertura.xml
          flags: unittests
          fail_ci_if_error: false
