name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore CEAISuite.slnx

      - name: Build Release
        run: dotnet build CEAISuite.slnx -c Release --no-restore

      - name: Test
        run: dotnet test src/CEAISuite.Tests/CEAISuite.Tests.csproj -c Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish src/CEAISuite.Desktop/CEAISuite.Desktop.csproj -c Release -r win-x64 --self-contained -o publish/

      - name: Package
        run: Compress-Archive -Path publish/* -DestinationPath CEAISuite-${{ github.ref_name }}-win-x64.zip
        shell: pwsh

      - name: Checksum
        run: |
          $hash = (Get-FileHash CEAISuite-${{ github.ref_name }}-win-x64.zip -Algorithm SHA256).Hash
          "$hash  CEAISuite-${{ github.ref_name }}-win-x64.zip" | Out-File -FilePath SHA256SUMS.txt
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CEAISuite-${{ github.ref_name }}-win-x64.zip
            SHA256SUMS.txt
          generate_release_notes: true
