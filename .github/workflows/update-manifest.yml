name: Update Manifest

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Generate update.json
        env:
          TAG: ${{ github.event.release.tag_name }}
          BODY: ${{ github.event.release.body }}
        run: |
          VERSION="${TAG#v}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/CEAISuite-${TAG}-win-x64.zip"
          CHECKSUM=$(echo "$BODY" | grep -oP 'SHA256:\s*\K[a-fA-F0-9]{64}' | head -1 || echo "")
          NOTES=$(echo "$BODY" | head -20)

          cat > update.json <<EOF
          {
            "version": "${VERSION}",
            "downloadUrl": "${DOWNLOAD_URL}",
            "checksum": "${CHECKSUM}",
            "releaseNotes": $(echo "$NOTES" | jq -Rs .)
          }
          EOF

          cat update.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json
          git diff --cached --quiet || git commit -m "chore: update manifest for ${{ github.event.release.tag_name }}"
          git push
